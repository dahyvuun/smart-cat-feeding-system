version: '3.8'

services:
  ai-backend:
    build: ./ai-backend
    container_name: cat-ai-backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  node-red:
    image: nodered/node-red:latest
    container_name: node-red
    ports:
      - "1880:1880"
    volumes:
      - ./node-red-data:/data
    restart: unless-stopped
